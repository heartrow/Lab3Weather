<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Task Board - Kanban</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Weather Tracking Web</h1>
    <div class="search">
        <input type="text" id="searchBar" placeholder="Type your city">
        <button id="searchBtn" onclick="handleSearch()">Search</button>
    </div>

    <div class="status" id="status"></div>
    <div id="bannerContainer"></div>

    <section class="current-weather">
        <h2 class="city" id="city">City</h2>
        <div class="temp" id="temp">Temperature</div>
        <div class="weatherDesc" id="weatherDesc">Weather Description</div>

        <div class="details-grid">
            <div><strong>Humidity:</strong> <span id="humidity">--%</span></div>
            <div><strong>Wind Speed:</strong> <span id="wind">-- km/h</span></div>
        </div>
    </section>

    <section class="forecast-row">
        <div class="forecast-card">
            <div class="day">Mon</div>
            <div class="icon">☀️</div>
            <div class="temp2">
                <span class="high">--°</span> / <span class="low">--°</span>
            </div>
        </div>
        <div class="forecast-card">
            <div class="day">Tue</div>
            <div class="icon">☀️</div>
            <div class="temp2">
                <span class="high">--°</span> / <span class="low">--°</span>
            </div>
        </div>
        <div class="forecast-card">
            <div class="day">Wed</div>
            <div class="icon">☀️</div>
            <div class="temp2">
                <span class="high">--°</span> / <span class="low">--°</span>
            </div>
        </div>
        <div class="forecast-card">
            <div class="day">Thu</div>
            <div class="icon">☀️</div>
            <div class="temp2">
                <span class="high">--°</span> / <span class="low">--°</span>
            </div>
        </div>
        <div class="forecast-card">
            <div class="day">Fri</div>
            <div class="icon">☀️</div>
            <div class="temp2">
                <span class="high">--°</span> / <span class="low">--°</span>
            </div>
        </div>
        <div class="forecast-card">
            <div class="day">Sat</div>
            <div class="icon">☀️</div>
            <div class="temp2">
                <span class="high">--°</span> / <span class="low">--°</span>
            </div>
        </div>
        <div class="forecast-card">
            <div class="day">Sun</div>
            <div class="icon">☀️</div>
            <div class="temp2">
                <span class="high">--°</span> / <span class="low">--°</span>
            </div>
        </div>
    </section>
    <script src="script.js" defer></script>
</body>
</html>
