<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Task Board - Kanban</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>
    <h1>Weather Tracking Web</h1>
    <div class="search">
        <input type="text" id="searchBar" placeholder="Type your city">
        <button id="searchBtn">Search</button>
    </div>

    <div class="grid">
        <h3>City </h3>
        <p>Temperature</p>
        <p>Weather Description</p>
        <p>Humidity</p>
        <p>Wind Speed</p>
        <p>Time</p>
    </div>
</body>
</html>
